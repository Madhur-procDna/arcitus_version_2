# ──────────────────────────────────────────────────────────────
# Nginx reverse-proxy for local Docker development
# ──────────────────────────────────────────────────────────────
#
# Traffic flow:
#   localhost:80  →  nginx
#     /                →  frontend:3000  (Next.js SSR app)
#     /api/backend/    →  backend:8001   (FastAPI — debug shortcut)
#
# The Next.js app itself proxies browser /api/query calls to
# the FastAPI container internally (server-side route handler).
# ──────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── General settings ──────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Gzip compression ─────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── WebSocket upgrade map ─────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream definitions ──────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8001;
    }

    # ── Server block ──────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Large client bodies (file uploads, big JSON payloads)
        client_max_body_size 50m;

        # ── Direct backend access (debugging convenience) ─────
        # curl http://localhost/api/backend/health
        # curl -X POST http://localhost/api/backend/query -H "Content-Type: application/json" -d '...'
        location /api/backend/ {
            # Strip /api/backend prefix: /api/backend/health → /health
            rewrite ^/api/backend/(.*)$ /$1 break;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long-running NL→SQL queries can take 10+ minutes
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
            proxy_connect_timeout 10s;
        }

        # ── Everything else → Next.js frontend ────────────────
        # This includes:
        #   /            → main page
        #   /login       → login page
        #   /api/query   → Next.js server-side proxy to FastAPI
        #   /api/auth/*  → Next.js auth routes
        #   /_next/*     → static assets & chunks
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket upgrade (Next.js HMR in dev, general WS support)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;

            # Long timeouts for slow /api/query proxy calls
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
            proxy_connect_timeout 10s;

            # Disable buffering for streaming responses
            proxy_buffering off;
        }
    }
}

