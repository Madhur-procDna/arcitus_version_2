# ══════════════════════════════════════════════════════════════
# Compass.auxo — Docker Compose
# ══════════════════════════════════════════════════════════════
#
# Usage (development / EC2 HTTP):
#   docker compose --env-file .env --env-file deployment.env up --build -d
#
# Optional HTTPS on EC2 (after certs in deploy/certs/):
#   Set NGINX_CONF_PATH=./nginx/nginx.https.conf in deployment.env, then:
#   docker compose --env-file .env --env-file deployment.env \\
#     -f docker-compose.yml -f docker-compose.https.yml up --build -d
#
# Host ports (production):
#   NGINX_HTTP_PORT   — published HTTP (default 80). Use 8080 if 80 is taken.
#   NGINX_HTTPS_PORT  — used only with docker-compose.https.yml (default 443).
#   NGINX_CONF_PATH   — default ./nginx/nginx.conf; use ./nginx/nginx.https.conf for TLS.
#
# Internal service ports (do not change unless you update Dockerfiles + nginx upstreams):
#   frontend:3000, backend:8001, redis:6379
#
# Access:
#   http://<host>:${NGINX_HTTP_PORT:-80}/  → Next.js (via Nginx)
#   http://<host>:${NGINX_HTTP_PORT:-80}/api/backend/health  → FastAPI health
#
# ══════════════════════════════════════════════════════════════

services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        SDA_BACKEND_URL: http://backend:8001
    container_name: compass-frontend
    environment:
      - NODE_ENV=production
      - SDA_BACKEND_URL=http://backend:8001
    depends_on:
      backend:
        condition: service_started
    networks:
      - compass-net
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: compass-backend
    env_file:
      - .env
    environment:
      # Always use the Compose service name (not 127.0.0.1 from a dev .env)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - compass-net
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: compass-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ${NGINX_CONF_PATH:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - compass-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: compass-redis
    networks:
      - compass-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  compass-net:
    driver: bridge
